name: data-stack

# ─── Airflow shared config ────────────────────────────────────────────────────
x-airflow-common: &airflow-common
  build:
    context: ../airflow
    dockerfile: Dockerfile
  image: data-stack/airflow:3.1.8
  env_file: .env
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW__METRICS__STATSD_ON: "true"
    AIRFLOW__METRICS__STATSD_HOST: prometheus
    AIRFLOW__METRICS__STATSD_PORT: "9125"
    # Airflow 3.x: worker comunica com API server via HTTP (não via localhost)
    # Airflow 3.x: chave compartilhada para assinar/validar JWTs de execução de tasks
    # Sem isso cada processo gera os.urandom(16) próprio → scheduler e API server discordam
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
  volumes:
    - ../airflow/dags:/opt/airflow/dags
    - ../airflow/logs:/opt/airflow/logs
    - ../airflow/plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - core-net
  profiles: [core]
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  PROFILE: core                                                          ║
  # ║  Sempre rodando: Postgres, Redis, Airflow, MinIO, Redpanda              ║
  # ║  Uso: docker compose --profile core up -d                               ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  postgres:
    image: postgres:16-alpine
    profiles: [core]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - core-net

  redis:
    image: redis:7-alpine
    profiles: [core]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - core-net

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    profiles: [core]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # Console UI
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - core-net

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    profiles: [core]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/landing;
        mc mb --ignore-existing local/bronze;
        mc mb --ignore-existing local/silver;
        mc mb --ignore-existing local/gold;
        mc mb --ignore-existing local/checkpoints;
        echo 'Buckets criados: landing, bronze, silver, gold, checkpoints';
      "
    networks:
      - core-net

  redpanda:
    image: redpandadata/redpanda:v24.3.1
    profiles: [core]
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --default-log-level=warn
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    ports:
      - "127.0.0.1:19092:19092"  # Kafka API (externo)
      - "127.0.0.1:18082:18082"  # HTTP Proxy
      - "127.0.0.1:18081:18081"  # Schema Registry
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - core-net

  redpanda-console:
    image: redpandadata/console:v2.7.2
    profiles: [core]
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
    volumes:
      - ./config/redpanda-console.yml:/tmp/config.yml:ro
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - core-net

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    restart: "no"
    command:
      - -c
      - |
        if ! whoami &>/dev/null; then
          echo "airflow:x:$(id -u):0:Airflow:/home/airflow:/bin/bash" >> /etc/passwd
        fi
        python -m airflow db migrate
        python -m airflow users create \
          --username ${AIRFLOW_ADMIN_USER:-admin} \
          --firstname Admin \
          --lastname Stack \
          --role Admin \
          --email admin@datastack.local \
          --password ${AIRFLOW_ADMIN_PASSWORD}

  airflow-webserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "127.0.0.1:8090:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || exit 1'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  PROFILE: analytics                                                     ║
  # ║  Dremio, Nessie, ClickHouse, OpenMetadata, Superset, Grafana, Prometheus ║
  # ║  Uso: docker compose --profile core --profile analytics up -d           ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  nessie:
    image: ghcr.io/projectnessie/nessie:0.99.0
    profiles: [analytics]
    ports:
      - "127.0.0.1:19120:19120"  # API REST + UI
    environment:
      QUARKUS_PROFILE: prod
      NESSIE_VERSION_STORE_TYPE: IN_MEMORY
    networks:
      - analytics-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:19120/api/v2/config || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  dremio:
    image: dremio/dremio-oss:25.2.0
    profiles: [analytics]
    ports:
      - "127.0.0.1:9047:9047"    # UI
      - "127.0.0.1:31010:31010"  # JDBC / ODBC
      - "127.0.0.1:32010:32010"  # Arrow Flight
    volumes:
      - dremio_data:/opt/dremio/data
    environment:
      DREMIO_JAVA_SERVER_EXTRA_OPTS: >-
        -Dpaths.dist=file:///opt/dremio/data/dist
    depends_on:
      nessie:
        condition: service_healthy
    networks:
      - core-net
      - analytics-net

  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    profiles: [analytics]
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-datastack}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "127.0.0.1:8123:8123"   # HTTP
      - "127.0.0.1:9009:9000"   # Native TCP
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - analytics-net

  elasticsearch:
    image: elasticsearch:8.10.2
    profiles: [analytics]
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms1g -Xmx1g
      xpack.security.enabled: "false"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - analytics-net

  openmetadata:
    image: openmetadata/server:1.6.0
    profiles: [analytics]
    environment:
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_USE_SSL: "false"
      DB_USER: postgres
      DB_USER_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: "5432"
      OM_DATABASE: openmetadata_db
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_SCHEME: http
      SERVER_HOST_API_URL: http://localhost:8585/api
      AIRFLOW_HOST: http://airflow-webserver:8080
      AIRFLOW_USERNAME: ${AIRFLOW_ADMIN_USER:-admin}
      AIRFLOW_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    ports:
      - "127.0.0.1:8585:8585"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - core-net
      - analytics-net

  prometheus:
    image: prom/prometheus:v3.1.0
    profiles: [analytics]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - core-net
      - analytics-net

  grafana:
    image: grafana/grafana:11.4.0
    profiles: [analytics]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - analytics-net

  superset-init:
    image: apache/superset:4.1.1
    profiles: [analytics]
    env_file: .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD}@postgres:5432/superset
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin
          --username ${SUPERSET_ADMIN_USER:-admin}
          --firstname Admin --lastname Stack
          --email admin@datastack.local
          --password ${SUPERSET_ADMIN_PASSWORD} &&
        superset init
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - core-net

  superset:
    image: apache/superset:4.1.1
    profiles: [analytics]
    env_file: .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD}@postgres:5432/superset
    volumes:
      - superset_data:/app/superset_home
    ports:
      - "127.0.0.1:8088:8088"
    command: superset run -h 0.0.0.0 -p 8088
    depends_on:
      superset-init:
        condition: service_completed_successfully
    networks:
      - core-net
      - analytics-net

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  PROFILE: ai                                                            ║
  # ║  Ollama (GPU), FastAPI agent, ChromaDB                                  ║
  # ║  Pré-requisito: NVIDIA Container Toolkit instalado no host              ║
  # ║  Uso: docker compose --profile core --profile ai up -d                  ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  ollama:
    image: ollama/ollama:0.6.2
    profiles: [ai]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-net

  ollama-init:
    image: ollama/ollama:0.6.2
    profiles: [ai]
    entrypoint: >
      /bin/sh -c "
        ollama pull qwen2.5-coder:14b;
        echo 'Modelo qwen2.5-coder:14b pronto.';
      "
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      - ollama
    restart: "no"
    networks:
      - ai-net

  chromadb:
    image: chromadb/chroma:0.6.3
    profiles: [ai]
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - ai-net

  agent:
    build:
      context: ../agent
      dockerfile: Dockerfile
    profiles: [ai]
    env_file: .env
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: qwen2.5-coder:14b
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      OPENMETADATA_HOST: http://openmetadata:8585
      DREMIO_HOST: http://dremio:9047
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
    ports:
      - "127.0.0.1:8500:8500"
    depends_on:
      - ollama
      - chromadb
    networks:
      - ai-net
      - analytics-net

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  core-net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1450"
  analytics-net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1450"
  ai-net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1450"

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  pgdata:
  redisdata:
  minio_data:
  redpanda_data:
  dremio_data:
  clickhouse_data:
  es_data:
  prometheus_data:
  grafana_data:
  superset_data:
  ollama_data:
  chroma_data:
