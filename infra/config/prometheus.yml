global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: airflow
    static_configs:
      - targets: [airflow-webserver:8080]
    metrics_path: /metrics

  - job_name: redpanda
    static_configs:
      - targets: [redpanda:9644]
    metrics_path: /public_metrics

  - job_name: clickhouse
    static_configs:
      - targets: [clickhouse:9363]
    metrics_path: /metrics

  - job_name: minio
    static_configs:
      - targets: [minio:9000]
    metrics_path: /minio/v2/metrics/cluster
