apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    jsonData:
      host: clickhouse
      port: 9000
      username: ${CLICKHOUSE_USER:-default}
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD}
    editable: false
